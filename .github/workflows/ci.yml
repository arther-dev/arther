name: CI

on:
  pull_request:
  push:
    branches: [main]

# Supersede an in-flight run when a newer commit lands on the same ref, so a
# stuck/slow run (e.g. a hung Playwright browser install) is auto-cancelled
# instead of piling up or blocking the PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck test build
      - name: Migration drift check
        run: bash scripts/check-migration-drift.sh

  e2e:
    name: Playwright E2E (app + portal)
    runs-on: ubuntu-latest
    # The slowest job (builds both apps + installs a browser); cap it so a hung
    # browser install fails fast and the run can be re-kicked, not left for 6h.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=app --filter=portal
      # Cache the browser binaries (keyed on the lockfile, which pins Playwright)
      # so the slow, network-bound download is skipped on a hit — the main cause
      # of this job's run-to-run time swings.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # No `--with-deps`: that runs `apt-get` against the runner's Azure Ubuntu
      # mirror, which intermittently hangs (the cause of the stuck E2E jobs).
      # ubuntu-latest already ships Chromium's system libraries, so we only need
      # the (cached) browser binary — no apt, no mirror dependency.
      - name: Install Playwright browsers
        run: pnpm --filter @arther/e2e exec playwright install chromium
      - name: Run E2E suite
        run: pnpm test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  database:
    name: Migrations · smoke · RLS probe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arther
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arther"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:54329/arther
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply auth shim + migrations
        run: bash scripts/db-migrate.sh
      - name: Smoke probes + second-user RLS probe (F8.1)
        run: pnpm test:db
      # Validate the autonomous-loop seed applies cleanly on top of migrations
      # (Development/Autonomous/staging.md). Runs AFTER the probes so it can't
      # pollute their fixtures; a broken seed fails CI and can never self-merge.
      - name: Validate seed
        run: bash scripts/db-seed.sh

  # Guardrail for the full-self-merge-on-green-CI loop: with no human reviewer,
  # changes to schema/auth/RLS/billing/CI must FAIL unless the owner added the
  # `human-approved` label. See Development/Autonomous/guardrails.md.
  guardrails:
    name: Guardrails
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check protected paths
        env:
          BASE_REF: origin/${{ github.base_ref }}
          GUARDRAIL_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'human-approved') && '1' || '0' }}
        run: bash scripts/check-protected-paths.sh
