name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck test build
      - name: Migration drift check
        run: bash scripts/check-migration-drift.sh

  e2e:
    name: Playwright E2E (app + portal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=app --filter=portal
      - name: Install Playwright browsers
        run: pnpm --filter @arther/e2e exec playwright install --with-deps chromium
      - name: Run E2E suite
        run: pnpm test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  database:
    name: Migrations · smoke · RLS probe
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arther
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arther"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:54329/arther
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply auth shim + migrations
        run: bash scripts/db-migrate.sh
      - name: Smoke probes + second-user RLS probe (F8.1)
        run: pnpm test:db
